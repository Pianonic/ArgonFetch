services:
  frontend:
    build:
      context: ./ArgonFetch.Frontend
      dockerfile: Dockerfile
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=production
    command: npm start
    volumes:
      - ./ArgonFetch.Frontend:/app

  backend:
    build:
      context: .
      dockerfile: ArgonFetch.Backend/Dockerfile
      args:
        API_BASE_URL: "http://localhost:8000"  # Adjust based on deployment needs
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    volumes:
      - ./ArgonFetch.Backend:/app
    depends_on:
      - frontend